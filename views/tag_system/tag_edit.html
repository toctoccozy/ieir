<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タグの編集 | 管理画面</title>
<link rel="stylesheet" href="/ieir/views/tag_system/style.css">
</head>
<body>

<header class="page-header">
  <h1>タグ管理 ＞ タグの編集</h1>
</header>

<main class="page-main">
  <section class="form-panel form-panel--standalone">
    <h2>タグの編集</h2>
    <p class="form-panel__note">タグ名・グループの変更のみ行えます。商品への紐付けは一覧の「商品を追加」から行ってください。</p>

    <!-- サンプル：id=1（キティ）を編集する想定の表示例 -->
    <form method="POST" action="/ieir/views/tag_system/index.html">
      <div class="field">
        <label for="edit-tag-name">●タグ名</label>
        <input type="text" id="edit-tag-name" name="name" value="キティ">
      </div>

      <div class="field">
        <label for="edit-tag-group">●グループ</label>
        <select id="edit-tag-group" name="group">
          <option value="ip" selected>IP・キャラクター</option>
          <option value="material">素材・ブランド</option>
          <option value="motif">モチーフ</option>
          <option value="type">商品タイプ・形状</option>
          <option value="campaign">特集・キャンペーン</option>
        </select>
      </div>

      <div class="search-actions form-panel__actions">
        <a class="btn btn--outline" href="/ieir/views/tag_system/index.html">キャンセル</a>
        <button type="submit" class="btn btn--primary">保存する</button>
      </div>
    </form>
  </section>
</main>

</body>
</html>
